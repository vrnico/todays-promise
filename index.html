<!doctype html>
<!--
  ============================================================
  TODAY'S PROMISE  ·  Nico's back-pocket commit #1
  ------------------------------------------------------------
  The whole point of this file: show what "smallest shippable"
  actually means. The smallest version you can ship. Commit #1.

  THE ARC you narrate in class:
    • Commit #1 (min 1):  an input + a Save button. That's it.
                          Save did nothing on refresh. The promise vanished.
    • Commit #2 (the bug): "refresh wipes it." Real engineering problem.
                          Fixed with ~4 lines of localStorage. See SAVE/LOAD below.
    • Day 2+ / Week 1:    yesterday's promise + "did you keep it?"  (already stubbed in)
    • Week 2:             a shareable URL, or a tiny API. Later.

  One file. No framework. localStorage = the browser remembers, no server.
  Background: pixel-art cloudscape (embedded), a legibility scrim, and a
  parallax pixel-rain canvas. Still one file you can paste into GitHub.
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Today's Promise</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="One promise a day. Write it, keep it. A tiny thing that holds you to your word.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      /* Color 6 · Sand-Cream / Warm Slate */
      --bg:#141210; --ink:#f6f1e6; --dim:#bcae98;
      --pop:#ecd9a8; --pop-ink:#2a2212; --good:#9ad0a0; --line:rgba(230,220,190,.16);
      --panel:rgba(34,32,28,.60); --panel-solid:#24221d; --panel-line:rgba(230,220,190,.26);
      --field:rgba(18,16,12,.66);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}
    body{background:var(--bg);color:var(--ink);
      font-family:'DotGothic16',system-ui,sans-serif;line-height:1.5;min-height:100vh;
      position:relative;overflow-x:hidden}

    /* ===== scene layers (back -> front) =====
       sky(-20) clouds(-18) scrim(-16) rain-far(-14) FAR-mtn(-12) rain-mid(-10)
       NEAR-mtn(-8) rain-near(-6) floor(-4) content(1) rain-front(5)
       The four rain planes are interleaved with the mountains so the storm has real depth. */

    /* 1. the pixel-art sky. Lit brighter, with an obvious slow ambient light-breathe. */
    body::before{content:"";position:fixed;inset:0;z-index:-20;
      background:url("art/sky_clouds.png") center top / cover no-repeat;
      image-rendering:pixelated;image-rendering:crisp-edges;
      transform-origin:center;will-change:transform,filter;
      transform:translate3d(var(--sky-x,0px),var(--sky-y,0px),0) scale(1.07);
      filter:brightness(1.22) saturate(1.04);
      animation:skyAmbient 20s ease-in-out infinite}
    /* ambient light swells and fades over ~20s — kept deliberately visible */
    @keyframes skyAmbient{
      0%,100%{filter:brightness(1.12) saturate(1.00)}
      50%    {filter:brightness(1.38) saturate(1.14)}}

    /* 2. drifting cloud sprites: pass across the sky BEHIND the mountains (depth set per-cloud in JS) */
    #cloudsBack,#cloudsFront,#cloudsOver{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    #cloudsBack{z-index:-18}   /* behind the mountains, in the sky */
    #cloudsFront{z-index:-5}   /* in front of the mountains, but behind the UI text/card */
    #cloudsOver{z-index:3}     /* a faint wisp drifting OVER the content (rain still falls in front) */
    .cloud{position:absolute;left:0;top:0;background-repeat:no-repeat;background-size:100% 100%;
      image-rendering:pixelated;image-rendering:crisp-edges;transform-origin:left top;will-change:transform}

    /* 3. legibility scrim: lighter up top so the (now brighter) sky shows, darker toward content */
    body::after{content:"";position:fixed;inset:0;z-index:-16;
      background:linear-gradient(180deg,
        rgba(12,18,28,.10) 0%,
        rgba(12,18,28,.20) 40%,
        rgba(12,18,28,.38) 78%,
        rgba(12,18,28,.52) 100%);}

    #rainFar{position:fixed;inset:0;z-index:-14;pointer-events:none}    /* behind the far mountain */

    /* 4. the FAR mountain: full width, peak near the top; transparent upper area shows sky+clouds */
    #mtn{position:fixed;inset:0;z-index:-12;pointer-events:none;
      background:url("art/mountain_1_big.png") center top / 100% auto no-repeat;
      image-rendering:pixelated;image-rendering:crisp-edges}

    #rainMid{position:fixed;inset:0;z-index:-10;pointer-events:none}    /* between the two mountains */

    /* 5. the NEAR mountain (bottom-left foreground): pinned static to the bottom-left */
    #mtnLeft{position:fixed;left:0;right:0;bottom:0;z-index:-8;pointer-events:none;height:38vh;
      background:url("art/mountain_bottom_left.png") left bottom / auto 100% no-repeat;
      image-rendering:pixelated;image-rendering:crisp-edges;
      -webkit-mask-image:linear-gradient(90deg,#000 0,#000 62%,transparent 100%);
      mask-image:linear-gradient(90deg,#000 0,#000 62%,transparent 100%);}

    #rainNear{position:fixed;inset:0;z-index:-6;pointer-events:none}    /* in front of the near mountain */

    /* 6. a soft floor: mutes the busy terrain under the lower content for legibility */
    #floor{position:fixed;left:0;right:0;bottom:0;height:42vh;z-index:-4;pointer-events:none;
      background:linear-gradient(180deg,rgba(12,18,28,0) 0%,rgba(12,18,28,.30) 55%,rgba(12,18,28,.55) 100%);}

    #rainFront{position:fixed;inset:0;z-index:5;pointer-events:none}    /* over the content */

    .wrap{position:relative;z-index:1}

    /* ===== HERO · Lower-Right Card ===== */
    .hero{position:relative;min-height:100vh}
    /* top-left legibility fade behind the date + title (keeps them readable over open sky) */
    .hero::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(120% 92% at 0% 0%,
        rgba(14,12,9,.64) 0%, rgba(14,12,9,.32) 32%, transparent 58%)}
    /* bottom-right backing behind the card */
    .hero::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(122% 100% at 100% 100%, rgba(14,12,9,.66) 0%, transparent 60%)}
    .head{position:absolute;top:8vh;left:5vw;width:min(52%,540px);z-index:1}
    .dock{position:absolute;right:4.5vw;bottom:7vh;width:min(88%,430px);z-index:1}
    .hero > footer{position:absolute;left:5vw;bottom:5vh;z-index:1;max-width:42%}

    .eyebrow{font:700 12px/1 'DotGothic16',monospace;letter-spacing:.24em;
      text-transform:uppercase;color:var(--pop);margin-bottom:1.1em;
      text-shadow:0 1px 5px rgba(6,10,20,.85),0 0 14px rgba(6,10,20,.6)}
    h1{font-size:clamp(28px,4.6vw,48px);font-weight:700;line-height:1.12;letter-spacing:0;
      text-shadow:0 2px 12px rgba(6,10,20,.9),0 0 22px rgba(6,10,20,.5)}
    .sub{color:#ece4d3;margin-top:.7em;font-size:clamp(16px,2vw,20px);
      text-shadow:0 1px 8px rgba(6,10,20,.9),0 0 16px rgba(6,10,20,.55)}

    /* Box 2 · Hard Pixel Border — square corners, solid panel, hard offset shadow */
    .card{margin-top:2.6em;border:3px solid var(--panel-line);border-radius:0;
      background:var(--panel-solid);padding:clamp(22px,5vw,34px);
      box-shadow:9px 9px 0 rgba(0,0,0,.55)}
    label{display:block;font:700 12px/1 'DotGothic16',monospace;letter-spacing:.18em;
      text-transform:uppercase;color:var(--dim);margin-bottom:.8em}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    #promise{flex:1;min-width:220px;background:var(--field);border:1px solid var(--line);
      color:var(--ink);font:500 clamp(17px,2.3vw,22px) 'DotGothic16',sans-serif;
      padding:.7em .9em;border-radius:9px;outline:none}
    #promise:focus{border-color:var(--pop);box-shadow:0 0 0 3px rgba(236,217,168,.20)}
    button{background:var(--pop);color:var(--pop-ink);border:none;cursor:pointer;font-weight:700;
      font-size:17px;padding:.75em 1.3em;border-radius:9px;transition:transform .12s}
    button:hover{transform:translateY(-1px)}
    .saved{margin-top:1.1em;font-size:clamp(19px,2.6vw,26px);font-weight:700;
      letter-spacing:-.01em;min-height:1.4em}
    .saved .q{color:var(--dim);font-weight:500;font-size:.7em;display:block;margin-bottom:.2em}
    .flash{color:var(--good);font:700 13px/1 'DotGothic16',monospace;letter-spacing:.1em;
      text-transform:uppercase;opacity:0;transition:opacity .2s;margin-top:.7em}
    .flash.on{opacity:1}

    /* yesterday: the Week-1 direction, already stubbed so the arc is visible */
    .yday{margin-top:2em;padding-top:1.5em;border-top:1px solid var(--line);color:var(--dim)}
    .yday .lab{font:700 11px/1 'DotGothic16',monospace;letter-spacing:.18em;text-transform:uppercase}
    .yday p{margin-top:.5em;color:var(--ink);font-size:clamp(16px,2vw,19px)}
    .keep{display:flex;gap:8px;margin-top:.8em}
    .keep button{background:transparent;border:1px solid var(--line);color:var(--dim);
      font-size:14px;padding:.45em .9em}
    .keep button.kept{border-color:var(--good);color:var(--good)}
    .keep button.broke{border-color:#ff6b5e;color:#ff6b5e}

    footer{margin-top:4em;color:var(--dim);font:500 13px/1.6 'DotGothic16',monospace;
      text-shadow:0 1px 6px rgba(6,10,20,.5)}

    /* ===== Ko-fi · fixed top-right, on a soft pill so it reads over the scene ===== */
    #kofi{position:fixed;top:20px;right:20px;z-index:8;line-height:0;
      background:rgba(20,18,14,.72);padding:7px 10px;border-radius:12px;
      box-shadow:0 8px 22px rgba(0,0,0,.4);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
    #kofi img{display:block}

    /* ===== survey: the "tell me what to build" section ===== */
    .survey{margin-top:5em;padding-top:3em;border-top:1px solid var(--line)}
    .survey h2{font-size:clamp(26px,4vw,38px);font-weight:700;line-height:1.05;
      letter-spacing:-.02em;margin-top:.35em;text-shadow:0 2px 12px rgba(6,10,20,.55)}
    .survey .sub{margin-top:.6em;font-size:clamp(15px,1.8vw,18px);max-width:44ch}
    /* white plate: Tally loads with transparentBackground=1, so its dark text
       needs a light surface underneath or it disappears into the page. */
    .survey .plate{margin-top:1.8em;background:#fff;border-radius:14px;
      padding:clamp(10px,2vw,18px);box-shadow:0 18px 50px rgba(0,0,0,.45)}
    .survey iframe{display:block;width:100%;border:0}

    @media (prefers-reduced-motion: reduce){
      button:hover{transform:none}
      body::before{animation:none}
    }

    /* ===== mobile: default to a centered stacked column, NO giant backing fade ===== */
    @media (max-width:760px){
      .hero{min-height:auto;display:flex;flex-direction:column}
      .hero::before,.hero::after{display:none}      /* no giant shadow/blur behind content */
      .head,.dock{position:static;width:auto;max-width:560px;margin:0 auto}
      .head{padding-top:10vh}
      .dock{margin-top:2em;margin-bottom:2.5em}
      .hero > footer{position:static;max-width:none;margin:1.4em auto 4vh;text-align:center}
      /* lighten the near mountain's fade so it reads as a real hill in the corner on phones */
      #mtnLeft{height:32vh;-webkit-mask-image:linear-gradient(90deg,#000 0,#000 74%,transparent 100%);
        mask-image:linear-gradient(90deg,#000 0,#000 74%,transparent 100%)}
    }
  </style>
</head>

<body>
<div id="cloudsBack"></div>
<canvas id="rainFar"></canvas>
<div id="mtn"></div>
<canvas id="rainMid"></canvas>
<div id="mtnLeft"></div>
<div id="cloudsFront"></div>
<canvas id="rainNear"></canvas>
<div id="floor"></div>

<!-- support link, pinned top-right over the scene -->
<div id="kofi"><a href="https://ko-fi.com/K3K51X2TV5" target="_blank" rel="noopener"><img height="36" style="border:0;height:36px" src="https://storage.ko-fi.com/cdn/kofi1.png?v=6" alt="Buy Me a Coffee at ko-fi.com"></a></div>

<div class="wrap">

  <!-- HERO · Lower-Right Card layout: title/date top-left over open sky, card bottom-right -->
  <section class="hero">
    <div class="head">
      <p class="eyebrow" id="today">Today</p>
      <h1>Today's Promise</h1>
      <p class="sub">One thing you'll actually do today. Write it down. Keep your word.</p>
    </div>

    <div class="dock">
      <div class="card">
        <label for="promise">Today I will…</label>
        <div class="row">
          <input id="promise" type="text" placeholder="ship one small thing" autocomplete="off">
          <button id="save">Save</button>
        </div>
        <div class="flash" id="flash">Saved.</div>
        <div class="saved" id="shown"></div>
      </div>

      <div class="yday" id="ydayBox" hidden>
        <span class="lab">Yesterday you promised</span>
        <p id="ydayText"></p>
        <div class="keep">
          <button id="kept">I kept it</button>
          <button id="broke">I didn't</button>
        </div>
      </div>
    </div>

    <footer>one file · remembered in your browser · hosted free on GitHub Pages</footer>
  </section>
</div>

<canvas id="rainFront"></canvas>
<div id="cloudsOver"></div>

<script>
  // ===== LAYERED PIXEL RAIN =====
  // Four canvases, one per depth, interleaved with the mountains (see z-order in CSS):
  // rainFar sits BEHIND the far mountain, rainMid BETWEEN the two mountains, rainNear in
  // front of the near mountain, rainFront over the content. Farther = smaller/fainter/slower.
  // Streaks are hard pixel blocks (no anti-alias) to match the pixel-art scene.
  (function(){
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const defs = [
      {id:'rainFar',   color:'rgba(200,214,236,0.16)', speed:2.6, len:16, block:3, slope:0.28, width:1, density:9000},
      {id:'rainMid',   color:'rgba(210,224,244,0.24)', speed:4.0, len:24, block:4, slope:0.32, width:1, density:7000},
      {id:'rainNear',  color:'rgba(222,234,250,0.34)', speed:6.2, len:32, block:4, slope:0.37, width:2, density:5600},
      {id:'rainFront', color:'rgba(233,243,255,0.34)', speed:9.0, len:40, block:4, slope:0.42, width:2, density:8000}
    ];
    const layers = defs.map(d => {
      const cv = document.getElementById(d.id);
      return cv ? Object.assign({}, d, {cv, ctx: cv.getContext('2d'), drops: []}) : null;
    }).filter(Boolean);

    let W = 0, H = 0;
    function spawn(L, anywhere){
      return {
        x: Math.random() * (W + H*L.slope) - H*L.slope,
        y: anywhere ? Math.random()*H : -L.len,
        s: L.speed * (0.8 + Math.random()*0.5)
      };
    }
    function resize(){
      W = innerWidth; H = innerHeight;
      for (const L of layers){
        L.cv.width = W; L.cv.height = H;
        const n = Math.max(6, Math.round(W*H / L.density));
        L.drops.length = 0;
        for (let i=0;i<n;i++) L.drops.push(spawn(L, true));
      }
    }
    function drawLayer(L){
      const c = L.ctx; c.clearRect(0,0,W,H); c.fillStyle = L.color;
      const steps = Math.max(1, Math.round(L.len / L.block));
      for (const d of L.drops){
        d.y += d.s; d.x += d.s * L.slope;
        if (d.y > H) Object.assign(d, spawn(L, false));
        for (let k=0;k<steps;k++){
          c.fillRect((d.x + k*L.block*L.slope)|0, (d.y + k*L.block)|0, L.width, L.block);
        }
      }
    }
    function frame(){ for (const L of layers) drawLayer(L); requestAnimationFrame(frame); }

    addEventListener('resize', resize);
    resize();
    if (reduce){ for (const L of layers) drawLayer(L); }   // one calm static pass
    else requestAnimationFrame(frame);
  })();
</script>

<script>
  // ===== DRIFTING CLOUD SPRITES (two depth layers) =====
  // BACK clouds pass behind the mountains (in the sky); FRONT clouds (L:'front') drift low,
  // IN FRONT of the mountains but behind the UI text/card. Depth = size + speed + opacity:
  // front clouds are bigger, faster, more opaque and sit lower; back clouds slow and high.
  // Speeds are spread wide so no two move alike. Each wraps when it leaves the screen.
  (function(){
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const back  = document.getElementById('cloudsBack');
    const front = document.getElementById('cloudsFront');
    const over  = document.getElementById('cloudsOver');
    if (!back || !front) return;
    const SPR = { a:{src:'art/cloud1.png', w:512, h:160}, b:{src:'art/cloud2.png', w:508, h:92} };
    // L: layer · sp: sprite · top: vh · s: scale · o: opacity · v: px/sec · x0: start frac · md: mouse-lean px
    const defs = [
      // back layer — high in the sky, behind the mountains, slow
      {L:'back',  sp:'b', top:1,  s:0.80, o:0.26, v:1.2,  x0:0.10, md:2},
      {L:'back',  sp:'a', top:4,  s:1.05, o:0.30, v:2.0,  x0:0.46, md:3},
      {L:'back',  sp:'b', top:8,  s:1.30, o:0.36, v:2.9,  x0:0.82, md:5},
      {L:'back',  sp:'a', top:12, s:1.65, o:0.42, v:3.9,  x0:0.24, md:7},
      {L:'back',  sp:'b', top:16, s:2.00, o:0.46, v:5.0,  x0:0.62, md:9},
      {L:'back',  sp:'a', top:3,  s:0.95, o:0.28, v:1.6,  x0:0.95, md:3},
      {L:'back',  sp:'b', top:6,  s:1.15, o:0.32, v:2.4,  x0:0.04, md:4},
      {L:'back',  sp:'a', top:10, s:1.45, o:0.40, v:3.3,  x0:0.68, md:6},
      // front layer — lower, crossing IN FRONT of the mountains, bigger + faster
      {L:'front', sp:'a', top:24, s:1.70, o:0.44, v:6.5,  x0:0.15, md:14},
      {L:'front', sp:'b', top:32, s:2.10, o:0.50, v:8.5,  x0:0.55, md:18},
      {L:'front', sp:'a', top:41, s:2.55, o:0.52, v:11.5, x0:0.85, md:24},
      {L:'front', sp:'b', top:28, s:1.90, o:0.46, v:7.6,  x0:0.35, md:16},
      {L:'front', sp:'a', top:47, s:2.85, o:0.50, v:13.0, x0:0.70, md:28},
      {L:'front', sp:'b', top:21, s:1.50, o:0.40, v:5.4,  x0:0.02, md:12},
      // over layer — faint wisps drifting OVER the content (rain still falls in front of them)
      {L:'over',  sp:'b', top:30, s:2.20, o:0.20, v:9.0,  x0:0.30, md:0},
      {L:'over',  sp:'b', top:49, s:1.70, o:0.16, v:12.0, x0:0.82, md:0}
    ];
    const clouds = defs.map(d => {
      const sp = SPR[d.sp];
      const el = document.createElement('div');
      el.className = 'cloud';
      el.style.width = sp.w + 'px'; el.style.height = sp.h + 'px';
      el.style.top = d.top + 'vh';
      el.style.opacity = d.o;
      el.style.backgroundImage = `url(${sp.src})`;
      (d.L === 'over' ? (over || front) : d.L === 'front' ? front : back).appendChild(el);
      const w = sp.w * d.s;
      return { el, d, w, x: d.x0 * (innerWidth + w) - w };
    });

    let tx = 0, cx = 0;
    if (!reduce) addEventListener('mousemove', e => { tx = (e.clientX/innerWidth - .5) * 2; }, {passive:true});

    let last = null;
    function frame(now){
      if (last === null) last = now;
      const dt = Math.min(0.05, (now - last) / 1000); last = now;
      cx += (tx - cx) * .04;
      for (const c of clouds){
        c.x += c.d.v * dt;
        if (c.x > innerWidth + 80) c.x = -c.w - 80;   // wrap around
        c.el.style.transform = `translate3d(${(c.x - cx*c.d.md).toFixed(1)}px,0,0) scale(${c.d.s})`;
      }
      requestAnimationFrame(frame);
    }
    if (reduce){
      for (const c of clouds) c.el.style.transform = `translate3d(${c.x.toFixed(1)}px,0,0) scale(${c.d.s})`;
    } else requestAnimationFrame(frame);
  })();
</script>

<script>
  // ===== SKY PARALLAX + AMBIENT DRIFT =====
  // Only the back layer (sky) moves: a light parallax on mouse-move, plus a very slow
  // ambient drift so the clouds gently wander even when the mouse is still. The mountains
  // stay put — pinned to the scene — so the depth reads calm, not jittery.
  (function(){
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const body = document.body;
    const MOUSE = 5, DRIFT = 8;          // px: mouse parallax vs. ambient wander (both gentle)

    let tx = 0, ty = 0, cx = 0, cy = 0;  // target vs. smoothed mouse offset (-1..1)
    addEventListener('mousemove', e => {
      tx = (e.clientX / innerWidth  - .5) * 2;
      ty = (e.clientY / innerHeight - .5) * 2;
    }, {passive:true});

    let t0 = null;
    function frame(now){
      if (t0 === null) t0 = now;
      const t = (now - t0) / 1000;
      cx += (tx - cx) * .05;             // ease slowly so the sky glides
      cy += (ty - cy) * .05;
      // layered low-frequency sines = an unhurried, non-repeating wander
      const dx = Math.sin(t*0.055)*DRIFT + Math.sin(t*0.019)*DRIFT*0.5;
      const dy = Math.cos(t*0.041)*DRIFT*0.6;
      body.style.setProperty('--sky-x', (-cx*MOUSE + dx).toFixed(2) + 'px');
      body.style.setProperty('--sky-y', (-cy*MOUSE + dy).toFixed(2) + 'px');
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();
</script>

<script>
  // --- tiny date helpers (no library) ---
  // Local date, not UTC: toISOString() alone would file a 9pm promise in New York
  // under tomorrow's key, and it'd vanish on refresh.
  const dayKey = d => {
    const off = d.getTimezoneOffset() * 60000;
    return new Date(d - off).toISOString().slice(0,10);     // "2026-07-13"
  };
  const now = new Date();
  const todayK = dayKey(now);
  const yK = dayKey(new Date(now.getTime() - 86400000));    // yesterday

  document.getElementById('today').textContent =
    now.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});

  const input = document.getElementById('promise');
  const shown = document.getElementById('shown');
  const flash = document.getElementById('flash');

  // ===== LOAD =====  this is the fix for "refresh wiped my promise"
  const saved = localStorage.getItem('promise:' + todayK);
  if (saved){ input.value = saved; render(saved); }

  // ===== SAVE =====  four lines. the browser remembers. no server.
  document.getElementById('save').onclick = () => {
    const text = input.value.trim();
    if (!text) return;
    localStorage.setItem('promise:' + todayK, text);        // <-- persists across refresh
    render(text);
    flash.classList.add('on');
    setTimeout(() => flash.classList.remove('on'), 1200);
  };
  input.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('save').click(); });

  function render(text){
    shown.innerHTML = '<span class="q">You promised:</span>' + escapeHtml(text);
  }
  function escapeHtml(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ===== YESTERDAY (Week-1 direction, already working) =====
  const yText = localStorage.getItem('promise:' + yK);
  if (yText){
    document.getElementById('ydayBox').hidden = false;
    document.getElementById('ydayText').textContent = yText;
    const keptState = localStorage.getItem('kept:' + yK);
    if (keptState) markKept(keptState);
  }
  document.getElementById('kept').onclick  = () => setKept('yes');
  document.getElementById('broke').onclick = () => setKept('no');
  function setKept(v){ localStorage.setItem('kept:' + yK, v); markKept(v); }
  function markKept(v){
    document.getElementById('kept').classList.toggle('kept',  v === 'yes');
    document.getElementById('broke').classList.toggle('broke', v === 'no');
  }
</script>
</body>
</html>
